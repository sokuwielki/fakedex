<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future-Dex Terminal</title>
    <style>
        :root {
            --bg-black: #0a0a0a;
            --neon-green: #39ff14;
            --dark-green: #052e05;
            --sharp-edge: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0% 30%);
        }

        body {
            background-color: var(--bg-black);
            color: var(--neon-green);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- Header & Filters --- */
        header {
            border-bottom: 2px solid var(--neon-green);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .filter-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .type-btn {
            background: var(--dark-green);
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            padding: 8px 15px;
            cursor: pointer;
            clip-path: polygon(15% 0, 100% 0, 85% 100%, 0 100%);
            transition: all 0.3s ease;
        }

        .type-btn:hover {
            background: var(--neon-green);
            color: var(--bg-black);
            box-shadow: 0 0 10px var(--neon-green);
        }

        /* --- Main Grid --- */
        .dex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .pkmn-card {
            background: #111;
            border: 1px solid var(--dark-green);
            padding: 15px;
            position: relative;
            clip-path: var(--sharp-edge);
            transition: transform 0.2s, opacity 0.3s ease;
        }

        .pkmn-card:hover {
            border-color: var(--neon-green);
            transform: scale(1.05);
        }

        .pkmn-card img {
            width: 100%;
            height: 200px;
            filter: grayscale(0.5) sepia(0.2) hue-rotate(80deg); /* Optional: cyber-thematic filter */
            border-bottom: 1px solid var(--dark-green);
            margin-bottom: 10px;
        }

        .pkmn-info {
            text-align: left;
        }

        .pkmn-name {
            font-size: 1.2rem;
            font-weight: bold;
            display: block;
        }

        .pkmn-type {
            font-size: 0.8rem;
            opacity: 0.8;
            color: #fff;
        }

        /* --- Scanline Effect --- */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

<header>
    <div class="filter-container" id="type-filters">
        <button class="type-btn" onclick="filterType('all')">All</button>
        <button class="type-btn" onclick="filterType('Normal')">Normal</button>
        <button class="type-btn" onclick="filterType('Fire')">Fire</button>
        <button class="type-btn" onclick="filterType('Water')">Water</button>
        <button class="type-btn" onclick="filterType('Electric')">Electric</button>
        <button class="type-btn" onclick="filterType('Grass')">Grass</button>
        <button class="type-btn" onclick="filterType('Ice')">Ice</button>
        <button class="type-btn" onclick="filterType('Fighting')">Fighting</button>
        <button class="type-btn" onclick="filterType('Poison')">Poison</button>
        <button class="type-btn" onclick="filterType('Ground')">Ground</button>
        <button class="type-btn" onclick="filterType('Psychic')">Psychic</button>
        <button class="type-btn" onclick="filterType('Steel')">Steel</button>
        <button class="type-btn" onclick="filterType('Flying')">Flying</button>
        <button class="type-btn" onclick="filterType('Bug')">Bug</button>
        <button class="type-btn" onclick="filterType('Rock')">Rock</button>
        <button class="type-btn" onclick="filterType('Ghost')">Ghost</button>
        <button class="type-btn" onclick="filterType('Dragon')">Dragon</button>
        <button class="type-btn" onclick="filterType('Dark')">Dark</button>
        <button class="type-btn" onclick="filterType('Fairy')">Fairy</button>
        <button class="type-btn" onclick="filterType('Holy')">Holy</button>
    </div>
</header>

<main class="dex-grid" id="pokedex-container">
<!-- JavaScript will inject cards here -->
    
</main>
<script>
document.addEventListener('DOMContentLoaded', () => {
    loadPokedex();
});

async function loadPokedex() {
    const container = document.getElementById('pokedex-container');
    if (!container) return;

    try {
        const response = await fetch('./pokedex.json');
        const data = await response.json();
        container.innerHTML = ""; 

        Object.keys(data).forEach(slug => {
            const p = data[slug];
            const card = document.createElement('div');
            card.className = 'pkmn-card';
            
            // KEY ADDITION: Store types as a data attribute for easy filtering
            card.setAttribute('data-types', p.types.join(','));
            
            card.onclick = () => {
                window.location.href = `detail.html?id=${slug}`;
            };

            card.innerHTML = `
                <img src="${p.image}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/200?text=IMAGE+NOT+FOUND'">
                <div class="pkmn-info">
                    <span class="pkmn-name">${p.name}</span>
                    <span class="pkmn-type">${p.types.join(' / ')}</span>
                </div>
            `;
            container.appendChild(card);
        });
    } catch (error) {
        container.innerHTML = "<h2>TERMINAL ERROR: DATABASE OFFLINE</h2>";
    }
}

// THE FILTER FUNCTION
function filterType(type) {
    const cards = document.querySelectorAll('.pkmn-card');
    const targetType = type.toLowerCase(); // Convert filter to lowercase

    cards.forEach(card => {
        // Convert the card's stored types to lowercase too
        const pokemonTypes = card.getAttribute('data-types').toLowerCase().split(',');
        
        if (type === 'all' || pokemonTypes.includes(targetType)) {
            card.style.display = 'block';
        } else {
            card.style.display = 'none';
        }
    });
}
</script>

</body>
</html>
