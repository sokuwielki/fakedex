<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dossier: Loading...</title>
    <style>
        :root {
            --bg-black: #0a0a0a;
            --neon-green: #39ff14;
            --dark-green: #052e05;
        }

        body {
            background-color: var(--bg-black);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Animations --- */
        @keyframes slideLeft {
            from { transform: translateX(50%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes matrixFade {
            0% { opacity: 0; transform: translateY(10px); }
            50% { opacity: 0.5; color: #fff; }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* --- Layout --- */
        .dossier-container {
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: space-around;
            padding: 40px;
            gap: 20px;
        }

        .image-sector {
            flex: 1;
            text-align: center;
            animation: slideLeft 0.8s ease-out forwards;
        }

        .image-sector img {
            max-width: 80%;
            filter: drop-shadow(0 0 15px var(--dark-green));
            border: 2px solid var(--neon-green);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            background: rgba(57, 255, 20, 0.05);
        }

        .info-sector {
            flex: 1;
            padding: 20px;
            border-left: 1px solid var(--neon-green);
            animation: matrixFade 1s ease-out 0.5s both;
        }

        .pkmn-name { font-size: 3rem; margin: 0; text-shadow: 0 0 10px var(--neon-green); }
        .pkmn-type { font-size: 1.2rem; margin-bottom: 20px; color: #fff; }
        .description { line-height: 1.6; margin-bottom: 30px; border-top: 1px dotted var(--neon-green); padding-top: 10px; }

        /* --- Evolution Tree --- */
        .evo-tree {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .evo-node {
            text-align: center;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.3s;
        }

        .evo-node:hover { opacity: 1; transform: scale(1.1); }
        .evo-node img { width: 60px; height: 60px; border: 1px solid var(--neon-green); border-radius: 50%; }
        .evo-node.current { opacity: 1; border-bottom: 2px solid var(--neon-green); }

        .back-btn {
            position: absolute;
            top: 20px; left: 20px;
            color: var(--neon-green);
            text-decoration: none;
            border: 1px solid var(--neon-green);
            padding: 5px 15px;
        }
    </style>
</head>
<body>

<a href="index.html" class="back-btn">< EXIT_TERMINAL</a>

<div class="dossier-container" id="dossier">
    <!-- Content Injected by JS -->
</div>

<script>
    async function loadDetail() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const container = document.getElementById('dossier');

        try {
            const response = await fetch('./pokedex.json');
            const data = await response.json();
            const pokemon = data[id];

            if (!pokemon) {
                container.innerHTML = "<h1>ERROR 404: POKEMON NOT FOUND</h1>";
                return;
            }

            document.title = `Dossier: ${pokemon.name}`;

            // Building the Evolution Tree HTML
            let evoHtml = '';
            if (pokemon.evo_line) {
                pokemon.evo_line.forEach(evoId => {
                    const evoData = data[evoId];
                    const isCurrent = evoId === id ? 'current' : '';
                    evoHtml += `
                        <div class="evo-node ${isCurrent}" onclick="window.location.href='detail.html?id=${evoId}'">
                            <img src="${evoData.image}" alt="${evoData.name}">
                            <div style="font-size: 0.6rem;">${evoData.name}</div>
                        </div>
                    `;
                });
            }

            container.innerHTML = `
                <div class="image-sector">
                    <img src="${pokemon.image}" alt="${pokemon.name}">
                </div>
                <div class="info-sector">
                    <h1 class="pkmn-name">${pokemon.name}</h1>
                    <div class="pkmn-type">${pokemon.types.join(' // ')}</div>
                    <div class="description">
                        > ANALYZING BIOMETRICS...<br>
                        > ${pokemon.description || "No data available in archives."}
                    </div>
                    <h3>EVOLUTIONARY PATHWAY</h3>
                    <div class="evo-tree">
                        ${evoHtml}
                    </div>
                </div>
            `;

        } catch (error) {
            container.innerHTML = "<h1>FATAL ERROR: DATA STREAM INTERRUPTED</h1>";
        }
    }

    document.addEventListener('DOMContentLoaded', loadDetail);
</script>

</body>
</html>
