<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dossier: Loading...</title>
    <style>
        :root {
            --bg-black: #0a0a0a;
            --neon-green: #39ff14;
            --dark-green: #052e05;
            --dim-green: rgba(57, 255, 20, 0.3);
        }

        body {
            background-color: var(--bg-black);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            text-transform: uppercase;
        }

        /* --- Animations --- */
        @keyframes slideLeft {
            from { transform: translateX(30%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: 0%; }
        }

        /* --- Layout --- */
        .dossier-container {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 40px;
            padding: 60px 40px;
            max-width: 1400px;
            margin: auto;
        }

        .image-sector {
            position: relative;
            animation: slideLeft 0.8s ease-out forwards;
            text-align: center;
        }

        .image-sector img {
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--neon-green);
            padding: 10px;
            background: linear-gradient(135deg, #000, #052e05);
            box-shadow: 0 0 20px var(--dark-green);
        }

        /* --- Stats Visualization --- */
        .stats-container {
            margin-top: 20px;
            text-align: left;
            font-size: 0.9rem;
        }

        .stat-row {
            margin-bottom: 8px;
        }

        .stat-bar-bg {
            background: var(--dark-green);
            height: 10px;
            width: 100%;
            margin-top: 4px;
            position: relative;
        }

        .stat-bar-fill {
            background: var(--neon-green);
            height: 100%;
            box-shadow: 0 0 10px var(--neon-green);
            transition: width 1s ease-in-out;
        }

        /* --- Info Sector --- */
        .info-sector {
            border-left: 2px solid var(--neon-green);
            padding-left: 40px;
        }

        .pkmn-name { font-size: 4rem; margin: 0; line-height: 0.9; }
        .pkmn-type { color: #fff; margin: 10px 0 20px; letter-spacing: 4px; }
        
        .move-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .move-item {
            border: 1px solid var(--dim-green);
            padding: 5px 10px;
            font-size: 0.8rem;
        }

        .move-item::before { content: "> "; }

        .evo-tree {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            border-top: 1px solid var(--dim-green);
            padding-top: 20px;
        }

        .evo-node { cursor: pointer; text-align: center; font-size: 0.7rem; }
        .evo-node img { width: 50px; height: 50px; filter: grayscale(1); border: 1px solid var(--dim-green); }
        .evo-node.current img { filter: grayscale(0); border-color: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }

        .back-btn {
            position: fixed; top: 20px; left: 20px;
            color: var(--neon-green); text-decoration: none;
            border: 1px solid var(--neon-green); padding: 5px 15px;
            z-index: 10; background: black;
        }
    </style>
</head>
<body>

<a href="index.html" class="back-btn">< BACK_TO_DATABASE</a>

<div class="dossier-container" id="dossier">
    </div>

<script>
    async function loadDetail() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const container = document.getElementById('dossier');

        try {
            const response = await fetch('./pokedex.json');
            const data = await response.json();
            const p = data[id];

            if (!p) return;

            // Stat Labels (Map to your [1,2,3,4,5,6] array)
            const statLabels = ["HP", "ATK", "DEF", "SP.ATK", "SP.DEF", "SPD"];
            let statsHtml = p.stats.map((val, i) => `
                <div class="stat-row">
                    <span>${statLabels[i]}: ${val}</span>
                    <div class="stat-bar-bg"><div class="stat-bar-fill" style="width: ${(val/15)*100}%"></div></div>
                </div>
            `).join('');

            // Moves List
            let movesHtml = p.moves.map(m => `<div class="move-item">${m}</div>`).join('');

            // Evolution Tree
            let evoHtml = p.evo_line.map(evoId => {
                const e = data[evoId];
                return `
                    <div class="evo-node ${evoId === id ? 'current' : ''}" onclick="window.location.href='detail.html?id=${evoId}'">
                        <img src="${e.image}" alt="${e.name}">
                        <div>${e.name}</div>
                    </div>
                `;
            }).join('');

            container.innerHTML = `
                <div class="image-sector">
                    <img src="${p.image}" alt="${p.name}">
                    <div class="stats-container">
                        <h3>// ATTRIBUTE_SCORES</h3>
                        ${statsHtml}
                    </div>
                </div>
                <div class="info-sector">
                    <h1 class="pkmn-name">${p.name}</h1>
                    <div class="pkmn-type">${p.types.join(' // ')}</div>
                    <p style="color: #888;">> DESCRIPTION: ${p.description}</p>
                    
                    <h3 style="margin-top:40px;">// KNOWN_TECHNIQUES</h3>
                    <div class="move-list">${movesHtml}</div>

                    <h3 style="margin-top:40px;">// EVOLUTION_PATH</h3>
                    <div class="evo-tree">${evoHtml}</div>
                </div>
            `;

        } catch (e) {
            console.error(e);
            container.innerHTML = "<h1>SYSTEM FAILURE</h1>";
        }
    }
    document.addEventListener('DOMContentLoaded', loadDetail);
</script>
</body>
</html>
